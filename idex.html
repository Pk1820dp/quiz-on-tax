<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="quiz-header">
            <h2 id="question">Question text goes here</h2>
            <ul>
                <li>
                    <button class="answer-btn" id="btn1">Answer 1</button>
                </li>
                <li>
                    <button class="answer-btn" id="btn2">Answer 2</button>
                </li>
                <li>
                    <button class="answer-btn" id="btn3">Answer 3</button>
                </li>
                <li>
                    <button class="answer-btn" id="btn4">Answer 4</button>
                </li>
            </ul>
        </div>
        <button id="next-btn" class="next-action-btn">Next Question</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
